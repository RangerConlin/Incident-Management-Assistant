services:
  sarapp-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sarapp-cloud
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - SARAPP_CLOUD_ROUTER_TOKEN=${SARAPP_CLOUD_ROUTER_TOKEN:?SARAPP_CLOUD_ROUTER_TOKEN must be set}
      - SARAPP_SERVER_NAME=${SARAPP_SERVER_NAME:-SARApp Cloud Router}
      - SARAPP_ROUTER_REQUEST_TIMEOUT_SECONDS=${SARAPP_ROUTER_REQUEST_TIMEOUT_SECONDS:-30}
      - SARAPP_ROUTER_HEARTBEAT_INTERVAL_SECONDS=${SARAPP_ROUTER_HEARTBEAT_INTERVAL_SECONDS:-15}
      - SARAPP_ROUTER_HEARTBEAT_TIMEOUT_SECONDS=${SARAPP_ROUTER_HEARTBEAT_TIMEOUT_SECONDS:-45}
      - SARAPP_ROUTER_MAX_PENDING_REQUESTS=${SARAPP_ROUTER_MAX_PENDING_REQUESTS:-200}
      - SARAPP_ROUTER_MAX_WS_CHANNELS=${SARAPP_ROUTER_MAX_WS_CHANNELS:-100}
      - SARAPP_ROUTER_MAX_BODY_BYTES=${SARAPP_ROUTER_MAX_BODY_BYTES:-20971520}
      - SARAPP_ROUTER_REGISTER_RATE_LIMIT=${SARAPP_ROUTER_REGISTER_RATE_LIMIT:-10}
    networks:
      - sarapp-net

networks:
  sarapp-net:
