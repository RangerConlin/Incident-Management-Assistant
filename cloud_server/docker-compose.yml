services:
  sarapp-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sarapp-cloud
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - SARAPP_CLOUD_ROUTER_TOKEN=${SARAPP_CLOUD_ROUTER_TOKEN:?SARAPP_CLOUD_ROUTER_TOKEN must be set}
      - SARAPP_SERVER_NAME=${SARAPP_SERVER_NAME:-SARApp Cloud Router}
    networks:
      - sarapp-net

networks:
  sarapp-net:
